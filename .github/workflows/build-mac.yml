name: Build Mac Binary

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout doom-ascii source
        uses: actions/checkout@v4
        with:
          repository: wojciech-graj/doom-ascii
          path: doom-ascii

      - name: Install dependencies
        run: brew install ncurses

      - name: Build
        run: |
          export LDFLAGS="-L/opt/homebrew/opt/ncurses/lib"
          export CPPFLAGS="-I/opt/homebrew/opt/ncurses/include"
          cd doom-ascii && make PLATFORM=unix

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: doom-ascii-mac
          path: doom-ascii/_unix/game/doom_ascii
